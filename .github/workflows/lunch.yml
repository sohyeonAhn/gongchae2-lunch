name: lunch-bot

on:
  schedule:
    # GitHub cron은 UTC 기준(KST=UTC+9, 서머타임 없음). 예약이 지연/누락될 수 있어
    # 시간대마다 여러 번 깨우고, '한 번만 전송' 가드(Firebase 표식)로 중복을 막는다.
    - cron: '10,20,30,40 0 * * 1-5'    # 09:10~09:40 KST — 참석/투표 요청
    - cron: '0,10,20,30,40 2 * * 1-5'  # 11:00~11:40 KST — 집계 결과 발표
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)
    inputs:
      mode:
        description: 'request 또는 result'
        required: false
        default: 'result'

permissions:
  contents: read
  models: read        # GitHub Models(무료 AI) 호출 권한

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run lunch bot
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # GitHub Models(무료 AI)용 — 자동 제공, 등록 불필요
          GH_MODEL: openai/gpt-4o-mini
          # 필요 시 아래도 Secret/Variable로 덮어쓸 수 있음 (없으면 스크립트 기본값 사용)
          # DB_BASE: ${{ secrets.DB_BASE }}
          # SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MIN=$(TZ=Asia/Seoul date +%H%M); MIN=$((10#$MIN))
            if [ "$MIN" -lt 1030 ]; then MODE=request; else MODE=result; fi
          fi
          # 수동 실행(테스트)은 중복가드를 무시하도록 force 전달
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then FORCE=force; else FORCE=""; fi
          echo "Running mode=$MODE force=$FORCE (KST $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M'))"
          python lunch_bot.py "$MODE" $FORCE
